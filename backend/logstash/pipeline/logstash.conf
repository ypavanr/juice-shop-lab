# Logstash pipeline
#
# Inputs:
#   - Filebeat (port 5044): system logs from /var/log/auth.log, /var/log/syslog
#
# Filter:
#   - Parse syslog / auth.log with grok
#   - Date normalisation
#   - Semantic event classification
#
# Output:
#   - HTTP POST to log-ingestion service /ingest endpoint

input {
  beats {
    port  => 5044
    type  => "system_log"
    # codec => "json"   # enable if Filebeat is configured with JSON codec
  }
}

# ── Filter ────────────────────────────────────────────────────────────────────
filter {
  if [type] == "system_log" {

    # ── Parse standard syslog header ─────────────────────────────────────────
    grok {
      match => {
        "message" => [
          # Full syslog with PID
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} %{PROG:program}\\[%{POSINT:pid}\\]: %{GREEDYDATA:log_message}",
          # Syslog without PID
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} %{PROG:program}: %{GREEDYDATA:log_message}",
          # Fallback
          "%{GREEDYDATA:log_message}"
        ]
      }
      overwrite  => ["message"]
      tag_on_failure => ["_grok_parse_failure"]
    }

    # ── Normalise timestamp ───────────────────────────────────────────────────
    if [syslog_timestamp] {
      date {
        match  => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
        target => "@timestamp"
        remove_field => ["syslog_timestamp"]
      }
    }

    # ── Extract source IP from SSH / PAM messages ─────────────────────────────
    grok {
      match => {
        "log_message" => [
          "from %{IP:ip}(?: port %{INT:src_port})?",
          "rhost=%{IP:ip}",
          "client %{IP:ip}"
        ]
      }
      tag_on_failure => []
    }

    # ── Extract username ──────────────────────────────────────────────────────
    grok {
      match => {
        "log_message" => [
          "(?:for invalid user|for user|Accepted .+ for|Failed .+ for) %{USERNAME:auth_user}",
          "user=%{USERNAME:auth_user}"
        ]
      }
      tag_on_failure => []
    }

    # ── Semantic event classification ─────────────────────────────────────────
    if "Accepted password" in [log_message] or "Accepted publickey" in [log_message] {
      mutate { add_field => { "event_classification" => "ssh_success" } }
    } else if "Failed password" in [log_message] or "authentication failure" in [log_message] {
      mutate { add_field => { "event_classification" => "ssh_failure" } }
    } else if "Invalid user" in [log_message] or "invalid user" in [log_message] {
      mutate { add_field => { "event_classification" => "ssh_invalid_user" } }
    } else if "sudo" in [program] {
      mutate { add_field => { "event_classification" => "privilege_escalation" } }
    } else if "session opened" in [log_message] {
      mutate { add_field => { "event_classification" => "session_opened" } }
    } else if "session closed" in [log_message] {
      mutate { add_field => { "event_classification" => "session_closed" } }
    } else {
      mutate { add_field => { "event_classification" => "system_event" } }
    }

    # ── Rename and clean fields ───────────────────────────────────────────────
    mutate {
      rename        => { "auth_user" => "username" }
      add_field     => { "normalized_source" => "system" }
      remove_field  => ["beat", "prospector", "offset"]
    }
  }
}

# ── Output ────────────────────────────────────────────────────────────────────
output {
  # Forward to the Python ingestion service
  http {
    url              => "${LOG_INGESTION_URL:http://log-ingestion:5001/ingest}"
    http_method      => "post"
    content_type     => "application/json"
    format           => "json"
    pool_max         => 50
    pool_max_per_route => 25
    socket_timeout   => 5
    retry_failed     => true
    retryable_codes  => [429, 500, 502, 503, 504]
    automatic_retries => 3
  }

  # Debug output — comment out in production
  # stdout { codec => rubydebug { metadata => false } }
}
